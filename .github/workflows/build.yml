name: Build K29
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dosya sistemini tara ve derle
        run: |
          find . -name "k29.cpp"
          FILE_PATH=$(find . -name "k29.cpp" | head -n 1)
          if [ -z "$FILE_PATH" ]; then
            echo "HATA: k29.cpp bulunamadi!"
            exit 1
          fi
          echo "Dosya bulundu: $FILE_PATH"
          clang++ -arch arm64 -dynamiclib "$FILE_PATH" -o k29.dylib -framework Foundation
      - name: Yukle
        uses: actions/upload-artifact@v4
        with:
          name: k29-dylib
          path: k29.dylib
